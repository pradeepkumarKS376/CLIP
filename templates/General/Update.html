<html>
<head>
{% load static %}
    <title>Update General</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<form method='POST' class="form-group">
{% if GeneralView %}
<table class="table table-hover table-responsive">
<thead>
<tr>
    {% for General in  GeneralHeader %}
    <th class="text-danger">
        {{General.name}}
    </th>
    {% endfor %}
</tr>
</thead>
<tbody>
<tr>
    <td><input type="text"   value="{{GeneralUpdate.id}}"> </td>
    <td><input type="text"   value="{{GeneralUpdate.Status}}"></td>
    <td><input type="text"   value="{{GeneralUpdate.Audit_Requests}}"> </td>
    <td><input type="text"   value="{{GeneralUpdate.Date_Requested}}"> </td>
    <td><input type="text"   value="{{GeneralUpdate.Due_date}}"> </td>
    <td><input type="text"   value="{{GeneralUpdate.Client_contact}}"> </td>
    <td><input type="text"   value="{{GeneralUpdate.Date_Received}}"> </td>
    <td><input type="text"   value="{{GeneralUpdate.Other_Comments}}"> </td>
    <td><input type="text"   value="{{GeneralUpdate.WT_Comment}}"> </td>
    <td><input type="text"   value="{{GeneralUpdate.Select}}"> </td>
</tr>
</tbody>
</table>
{% endif %}
{% csrf_token %}
<input class="btn btn-success" type='submit' value='Update General'>
</form>
</body></html>
